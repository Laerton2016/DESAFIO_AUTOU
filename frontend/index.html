<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Email Classifier | AutoU Challenge</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-50 font-sans min-h-screen">

    <div class="max-w-4xl mx-auto py-12 px-4">
        <header class="text-center mb-12">
            <h1 class="text-4xl font-bold text-slate-800 mb-2">Classificador de Emails <span class="text-blue-600">IA</span></h1>
            <p class="text-slate-600">Triagem inteligente e sugestão de respostas automáticas.</p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                <h2 class="text-lg font-semibold mb-4 flex items-center">
                    <i class="fa-solid fa-pen-to-square mr-2 text-blue-500"></i> Entrada de Dados
                </h2>
                
                <textarea id="emailText" rows="8" 
                    class="w-full p-4 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all mb-4"
                    placeholder="Cole o corpo do email aqui..."></textarea>
                
                <div class="relative mb-6">
                    <label class="block text-sm font-medium text-slate-700 mb-2 text-center">Ou faça upload de um arquivo (.txt ou .pdf)</label>
                    <input type="file" id="fileInput" accept=".txt,.pdf"
                        class="block w-full text-sm text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100 cursor-pointer border border-dashed border-slate-300 rounded-xl p-4">
                </div>

                <button onclick="processarEmail()" id="btnProcessar"
                    class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-6 rounded-xl transition-all shadow-lg shadow-blue-200 flex items-center justify-center">
                    <span id="btnText">Analisar Email</span>
                    <i id="spinner" class="fa-solid fa-circle-notch fa-spin ml-2 hidden"></i>
                </button>
            </div>

            <div id="resultCard" class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 flex flex-col opacity-50">
                <h2 class="text-lg font-semibold mb-4 flex items-center">
                    <i class="fa-solid fa-robot mr-2 text-purple-500"></i> Resultado da IA
                </h2>

                <div class="mb-6">
                    <span class="text-sm text-slate-500 uppercase font-bold tracking-wider">Classificação</span>
                    <div id="badgeCategoria" class="mt-1 inline-block px-3 py-1 rounded-full text-sm font-bold bg-slate-100 text-slate-400">
                        Aguardando...
                    </div>
                </div>

                <div class="flex-grow">
                    <span class="text-sm text-slate-500 uppercase font-bold tracking-wider">Sugestão de Resposta</span>
                    <div id="respostaSugerida" class="mt-2 p-4 bg-slate-50 rounded-xl border border-slate-100 italic text-slate-500">
                        O texto da resposta aparecerá aqui após a análise.
                    </div>
                </div>

                <div class="mt-6 flex flex-col sm:flex-row gap-4 justify-center">
                    <button onclick="copiarResposta()" class="text-blue-600 hover:text-blue-800 text-sm font-medium flex items-center justify-center">
                        <i class="fa-regular fa-copy mr-1"></i> Copiar
                    </button>
                    
                    <div class="border-l border-slate-200 hidden sm:block"></div> <button onclick="abrirEmail()" class="text-green-600 hover:text-green-800 text-sm font-medium flex items-center justify-center">
                        <i class="fa-regular fa-envelope mr-1"></i> Responder e-mail
                    </button>
                </div>
            </div>

        </div>
    </div>
<script src="./scripts/index.js"></script>
</body>
</html>
